name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Cancel superseded review runs on the same PR.
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Automated PR review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request and leave inline comments via the GitHub
            MCP tools (mcp__github_inline_comment__create_inline_comment).

            This is the Everybody Eats marketing site + Payload CMS (Next.js 15
            App Router). Read CLAUDE.md for the project's conventions before
            reviewing. Pay particular attention to:
            - Blocks pipeline: a new block must be registered in BOTH
              src/collections/Pages.ts and src/components/blocks/render-blocks.tsx,
              or it silently disappears.
            - Any schema change (collections/globals/blocks) MUST ship with a
              checked-in migration in src/migrations/ — a missing migration never
              reaches prod.
            - Images should go through <PayloadImage>, not next/image directly.
            - Brand/styling conventions in STYLEGUIDE.md.

            Focus on correctness bugs, security issues, and clear convention
            violations. Be concise; skip nitpicks and praise. If the PR looks
            good, say so briefly.
          claude_args: "--allowed-tools mcp__github_inline_comment__create_inline_comment"
