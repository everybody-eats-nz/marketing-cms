name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typegen & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Install the exact pnpm version pinned in package.json "packageManager"
      # via npm rather than pnpm/action-setup. The action lets an older
      # bundled pnpm self-switch to the pinned version through the registry,
      # which crashes whenever the pin is younger than pnpm's 24h
      # minimumReleaseAge quarantine ("Cannot use 'in' operator to search for
      # 'integrity' in undefined"), and its standalone mode leaves a broken
      # placeholder binary. npm applies no release-age quarantine, and because
      # the installed version matches the pin, pnpm never tries to switch.
      - name: Setup pnpm
        run: npm install -g "pnpm@$(node -p "require('./package.json').packageManager.match(/pnpm@([^+]+)/)[1]")"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # pnpm 11 (pinned via packageManager) requires Node >= 22.13.
          node-version: 22
          cache: pnpm

      # --frozen-lockfile fails the build if package.json and the lockfile drift.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Loads the Payload config, which runs checkDependencies(). This is the
      # step that catches mismatched @payloadcms/* versions (the failure that
      # only surfaced at runtime on the host before). No database required.
      - name: Generate Payload types
        run: pnpm payload generate:types

      # Frontend routes are force-dynamic, so the build never connects to the
      # database — these env vars only need to be present, not real.
      - name: Build
        run: pnpm build
        env:
          PAYLOAD_SECRET: ci-build-not-a-real-secret
          DATABASE_URI: postgres://payload:payload@localhost:5432/everybodyeats
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
