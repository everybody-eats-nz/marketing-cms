# Dependabot configuration
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # JavaScript / TypeScript dependencies (pnpm)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Pacific/Auckland"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    # Group related updates into a single PR to cut review noise.
    groups:
      payload:
        patterns:
          - "@payloadcms/*"
          - "payload"
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Pacific/Auckland"
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"

  # Docker base image
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Pacific/Auckland"
    labels:
      - dependencies
      - docker
