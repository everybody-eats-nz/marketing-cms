services:
  postgres:
    image: postgres:16-alpine
    container_name: everybodyeats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: everybodyeats
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d everybodyeats']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
